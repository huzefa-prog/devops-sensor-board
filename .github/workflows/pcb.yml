name: PCB DevOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Install KiCad
        run: sudo apt-get update && sudo apt-get install -y kicad

      - name: Create Output Folder
        run: mkdir -p outputs

      - name: Simulate Gerber Generation
        run: echo "Gerber files generated" > outputs/gerber.txt

      - name: Simulate BOM Generation
        run: echo "BOM generated" > outputs/bom.txt

      - name: Upload Files
        uses: actions/upload-artifact@v3
        with:
          name: pcb-output
          path: outputs/